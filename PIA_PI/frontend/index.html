<!DOCTYPE html>
<html>

<head>
    <title>Mundial 2026 - AR Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <div class="app-wrapper justify-content-center">
        <div class="text-center mb-5 fade-in-up">
            <h1 class="display-3 fw-bold text-white" style="text-shadow: 0 4px 10px rgba(0,0,0,0.2);">2026</h1>
            <p class="lead text-white fw-bold tracking-wider">BUSCAR</p>
        </div>

        <div class="w-100">
            <div class="glass-card fade-in-up delay-1 text-center p-4 mb-4" onclick="location.href='buscar.html'"
                style="cursor: pointer; border-left: 8px solid var(--dorado);">
                <i class="bi bi-qr-code-scan text-primary display-1 mb-3"></i>
                <h3 class="fw-bold text-dark">Buscar</h3>
                <p class="text-muted small mb-0">Apunta a una bandera</p>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <div class="glass-card fade-in-up delay-2 text-center h-100 py-4"
                        onclick="location.href='pregunta.html'">
                        <i class="bi bi-trophy-fill text-success fs-1 mb-2"></i>
                        <h6 class="fw-bold text-dark mb-0">Pregunta del Día</h6>
                    </div>
                </div>
                <div class="col-6">
                    <div class="glass-card fade-in-up delay-3 text-center h-100 py-4"
                        onclick="location.href='clips.html'">
                        <i class="bi bi-collection-play-fill text-danger fs-1 mb-2"></i>
                        <h6 class="fw-bold text-dark mb-0">Edición de clips</h6>
                    </div>
                </div>
            </div>
        </div>

    </div>
<div class="bottom-nav fade-in-up delay-3">
    
    <a href="index.html" class="nav-item-link active">
        <i class="bi bi-house-door-fill"></i>
    </a>

    <a href="buscar.html">
        <div class="camera-btn-container">
            <i class="bi bi-qr-code-scan"></i>
        </div>
    </a>

    <a href="clips.html" class="nav-item-link">
        <i class="bi bi-play-circle-fill"></i>
    </a>
    
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

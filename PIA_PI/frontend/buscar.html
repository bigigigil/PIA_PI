<!DOCTYPE html>
<html lang="es">
<head>
    <title>Scanner AR - Mundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        
        #camera-feed {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; 
            z-index: -1; 
            background: black; 
        }
      
        .overlay-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none; 
        }
    </style>
</head>

<body>

    <video id="camera-feed" autoplay playsinline muted></video>

    <button class="btn btn-light rounded-circle position-absolute top-0 start-0 m-4 shadow glass-card d-flex align-items-center justify-content-center" 
            style="z-index: 50; width: 50px; height: 50px; padding: 0;"
            onclick="location.href='index.html'">
        <i class="bi bi-x-lg text-dark"></i>
    </button>

    <div id="scan-ui" class="overlay-layer">
        <div class="scanner-container" id="scannerZone" onclick="iniciarCarga()">
            <div class="scan-line"></div>
        </div>

        <div class="scan-text mt-4 text-center">
            <h4 class="text-white fw-bold text-shadow">BUSCANDO MARCADOR...</h4>
            <span class="badge bg-dark bg-opacity-50 mt-2">Apunta a la bandera</span>
        </div>
    </div>

    <div id="loading-ui" class="overlay-layer hidden" style="background: rgba(0,0,0,0.6);">
        <div class="spinner-border text-dorado mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        
        <h2 class="text-white fw-bold animate-pulse">¡DETECTADO!</h2>
        <p class="text-white-50 mb-4">Descargando experiencia...</p>

        <div class="glass-card p-1 w-75" style="border-radius: 50px; background: rgba(255,255,255,0.2);">
            <div class="progress" style="height: 10px; border-radius: 50px; background: transparent;">
                <div id="progressBar" class="progress-bar bg-success progress-bar-striped progress-bar-animated" 
                     style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        
        async function startCamera() {
            try {
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                const videoElement = document.getElementById('camera-feed');
                videoElement.srcObject = stream;
            } catch (err) {
                console.error("Error al acceder a la cámara:", err);
                alert("No pudimos acceder a la cámara. Asegúrate de usar HTTPS o localhost.");
                
                document.getElementById('camera-feed').style.background = "url('assets/fondo_error.jpg') center/cover";
            }
        }

        
        function iniciarCarga() {
            
            document.getElementById('scan-ui').classList.add('hidden');
            
            const loadingUI = document.getElementById('loading-ui');
            loadingUI.classList.remove('hidden');

            
            const bar = document.getElementById('progressBar');
            
            setTimeout(() => { bar.style.width = "40%"; }, 500);
            setTimeout(() => { bar.style.width = "80%"; }, 1500);
            
            
            setTimeout(() => { 
                bar.style.width = "100%";
                window.location.href = 'pais.html'; 
            }, 3000);
        }

        
        window.addEventListener('load', startCamera);

        
        setTimeout(iniciarCarga, 5000);

    </script>
</body>
</html>

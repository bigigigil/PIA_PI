<!DOCTYPE html>
<html>

<head>
    <title>Escáner Mundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1c2407b26c61958baa9396325428388431527fe4/dist/aframe-master.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Loader mientras inicializa la cámara */
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arjs-loader div {
            text-align: center;
            font-size: 1.25em;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="arjs-loader">
        <div>Cargando descriptores de imágenes...</div>
    </div>

    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10;">
        <div class="glass-card d-inline-block px-4 py-2">
            <p class="m-0 fw-bold text-azul">Apunta a una bandera o logo</p>
        </div>
        <button class="btn btn-light rounded-circle shadow position-absolute top-0 start-0 m-3"
            onclick="window.location.href='index.html'">
            ⬅
        </button>
    </div>

    <a-scene vr-mode-ui="enabled: false;"
    renderer="logarithmicDepthBuffer: true;"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

       <a-nft type="nft" url="./assets/markers/mexico/bandera_mexico" smooth="true" id="marker-mexico"></a-nft>
        <a-nft type="nft" url="./assets/markers/sudafrica/bandera_sudafrica" smooth="true" id="marker-sudafrica"></a-nft>
        <a-nft type="nft" url="./assets/markers/japon/bandera_japon" smooth="true" id="marker-japon"></a-nft>
        <a-nft type="nft" url="./assets/markers/coreadelsur/bandera_coreadelsur" smooth="true" id="marker-corea-del-sur"></a-nft>
        <a-nft type="nft" url="./assets/markers/colombia/bandera_colombia" smooth="true" id="marker-colombia"></a-nft>
        <a-nft type="nft" url="./assets/markers/uruguay/bandera_uruguay" smooth="true" id="marker-uruguay"></a-nft>
        <a-nft type="nft" url="./assets/markers/espania/bandera_espania" smooth="true" id="marker-españa"></a-nft>
        <a-nft type="nft" url="./assets/markers/tunez/bandera_tunez" smooth="true" id="marker-tunez"></a-nft>
        <a-nft type="nft" url="./assets/markers/uzbekistan/bandera_uzbekistan" smooth="true" id="marker-uzbekistan"></a-nft>

      
        <a-entity camera></a-entity>
    </a-scene>

   <script>
        let detectionMade = false;

        // Lista de mapeo: ID del HTML vs Clave en tu JSON
        const marcadores = [
            { id: 'marker-mexico', key: 'mexico' },
            { id: 'marker-sudafrica', key: 'sudafrica' },
            { id: 'marker-japon', key: 'japon' },
            { id: 'marker-corea-del-sur', key: 'corea del sur' }, // Nota el espacio en la key
            { id: 'marker-colombia', key: 'colombia' },
            { id: 'marker-uruguay', key: 'uruguay' },
            { id: 'marker-españa', key: 'españa' },
            { id: 'marker-tunez', key: 'tunez' },
            { id: 'marker-uzbekistan', key: 'uzbekistan' }
        ];
        marcadores.forEach(item => {
            const el = document.querySelector(`#${item.id}`);
            if (el) {
                el.addEventListener('markerFound', () => {
                    if (!detectionMade) {
                        detectionMade = true;
                        console.log(`Encontrado: ${item.key}`);
                        if (navigator.vibrate) navigator.vibrate(200);
                        alert(`¡${item.key.toUpperCase()} DETECTADO! ✈️`);
                        
                        // Enviamos la key a la siguiente página
                        window.location.href = `pais.html?id=${encodeURIComponent(item.key)}`;
                    }
                });
            }
        });
    </script>
</body>

</html>

<script src="js/datos.js"></script> 

<script>
    window.onload = function() {

        const params = new URLSearchParams(window.location.search);
        const paisID = params.get('id');


        const data = infoPaises[paisID];

        if (data) {
            // 3. Rellenar el HTML con los datos
            document.querySelector('h1').innerText = `${data.nombre} ${data.bandera}`;
            document.querySelector('.badge').innerText = data.clasificado;
            
            // Actualizar tabla de stats (ejemplo simple)
            const filas = document.querySelectorAll('tbody tr td:last-child');
            if(filas.length > 0) {
                filas[0].innerText = data.stats.jugados;
                filas[1].innerText = data.stats.goles;
                filas[2].innerText = data.stats.pos;
            }

            // 4. Cargar el modelo 3D correcto
            const modeloEntity = document.querySelector('[gltf-model]');
            if (modeloEntity) {
                // Removemos el atributo primero para forzar la recarga
                modeloEntity.removeAttribute('gltf-model');
                setTimeout(() => {
                    modeloEntity.setAttribute('gltf-model', data.modelo);
                }, 100);
            }
        } else {
            alert("País no encontrado, cargando México por defecto.");
        }
    };
</script>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mundial 2026 - Editor de Clips</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #121212;
            color: white;
        }

        .video-container {
            background-color: #000;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #previewVideo {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
            transition: filter 0.4s ease-in-out;
        }

        .filter-btn {
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1055;
        }
    </style>
</head>

<body>

    <svg style="display: none;">
        <defs>
            <filter id="thermal">
                <feColorMatrix type="matrix"
                    values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 1 0" result="gray" />
                <feComponentTransfer in="gray">
                    <feFuncR type="table" tableValues="0 0 1 1" />
                    <feFuncG type="table" tableValues="0 0 0 1" />
                    <feFuncB type="table" tableValues="1 0 0 0" />
                </feComponentTransfer>
            </filter>

            <filter id="pixelate" x="0" y="0">
                <feFlood x="4" y="4" height="2" width="2" />
                <feComposite width="8" height="8" />
                <feTile result="a" />
                <feComposite in="SourceGraphic" in2="a" operator="in" />
                <feMorphology operator="dilate" radius="3" />
            </filter>
        </defs>
    </svg>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"
        preload="auto"></audio>

    <div class="container py-4 h-100 d-flex flex-column">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-outline-light rounded-circle" onclick="history.back()">
                <i class="bi bi-arrow-left"></i>
            </button>
           <div class="text-center mb-5 fade-in-up">
            <h1 class="display-3 fw-bold text-white" style="text-shadow: 0 4px 10px rgba(0,0,0,0.2);">EDITOR</h1>
            <p class="lead text-white fw-bold tracking-wider">˙✧˖°🎬 ⋆｡˚꩜</p>
        </div>
            <button class="btn btn-success rounded-pill fw-bold" onclick="guardarVideo()">
                <i class="bi bi-download"></i> Guardar
            </button>
        </div>

        <div class="video-container d-flex align-items-center justify-content-center mb-4">
            <video id="previewVideo" controls autoplay loop playsinline>
                <source src="assets/clips/prueba.mp4" type="video/mp4">
                navegadpr no compatible :c
            </video>
        </div>

        <div class="card bg-dark text-white border-secondary">
            <div class="card-body">
                <p class="small text-center mb-3 text-uppercase fw-bold text-muted">Aplica Filtros al Video</p>

                <div class="row g-2">
                    <div class="col-4">
                        <button class="btn btn-primary filter-btn w-100 py-2 active"
                            onclick="applyFilter(this, 'Normal', 'none')">
                            <i class="bi bi-camera-video"></i><br>Normal
                        </button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Desenfoque', 'blur(6px)')">
                            <i class="bi bi-droplet"></i><br>Desenfoque
                        </button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Alta Saturación', 'saturate(300%)')">
                            <i class="bi bi-brightness-high"></i><br>Saturado
                        </button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Tonalidad', 'hue-rotate(120deg)')">
                            <i class="bi bi-palette"></i><br>Ajuste Color
                        </button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Tonos Pastel', 'contrast(80%) brightness(120%) saturate(60%)')">
                            <i class="bi bi-flower1"></i><br>Pastel
                        </button>
                    </div>
                    <div class="col-4">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Cámara Térmica', 'url(#thermal)')">
                            <i class="bi bi-thermometer-sun"></i><br>Térmica
                        </button>
                    </div>
                    <div class="col-12 mt-2">
                        <button class="btn btn-outline-light filter-btn w-100 py-2"
                            onclick="applyFilter(this, 'Pixelado', 'url(#pixelate)')">
                            <i class="bi bi-grid-3x3"></i> Modo Retro (Pixelado)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <div id="feedbackToast" class="toast align-items-center text-white bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toastMessage">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            const params = new URLSearchParams(window.location.search);
            const videoURL = params.get('video');
            if (videoURL) {
                const reproductorEditor = document.getElementById('previewVideo');
                reproductorEditor.src = videoURL;
                reproductorEditor.load();
            }
        });

        const toastEl = document.getElementById('feedbackToast');
        const feedbackToast = new bootstrap.Toast(toastEl, { delay: 3000 }); // Aumenté el delay a 3s para mensajes largos
        const clickAudio = document.getElementById('clickSound');

        let filtroActual = 'none';

        function applyFilter(btnElement, filterName, filterCss) {
            clickAudio.currentTime = 0;
            clickAudio.play().catch(e => console.log("Audio bloqueado por navegador", e));

            filtroActual = filterCss;
            document.getElementById('previewVideo').style.filter = filterCss;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('btn-primary', 'active');
                btn.classList.add('btn-outline-light');
            });
            btnElement.classList.remove('btn-outline-light');
            btnElement.classList.add('btn-primary', 'active');

            document.getElementById('toastMessage').innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> ${filterName} aplicado`;
            feedbackToast.show();
        }

 
        async function guardarVideo() {
            const btnGuardar = document.querySelector("button[onclick='guardarVideo()']");
            if (btnGuardar.disabled) return; 
            btnGuardar.disabled = true;

            clickAudio.play();
            const video = document.getElementById('previewVideo');

            const teniaLoop = video.loop;
            video.loop = false;

            document.getElementById('toastMessage').innerHTML = `<i class="bi bi-record-circle-fill text-danger me-2"></i> Grabando filtro (Tardará lo que dure el video)...`;
            feedbackToast.show();

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 360;
            const ctx = canvas.getContext('2d');

            const stream = canvas.captureStream(30);

            try {
                const videoStream = video.captureStream ? video.captureStream() : video.mozCaptureStream();
                const audioTracks = videoStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    stream.addTrack(audioTracks[0]);
                }
            } catch (e) {
                console.log("No se pudo capturar el audio en este navegador.");
            }

            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const recordedChunks = [];

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Mundial_Editado.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                document.getElementById('toastMessage').innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> ¡Video guardado con éxito!`;
                feedbackToast.show();

                video.loop = teniaLoop;
                btnGuardar.disabled = false;
                video.play();
            };

            video.pause();
            video.currentTime = 0;
            
            function drawFrame() {
                if (video.paused || video.ended) return; 
                
                ctx.filter = filtroActual;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                requestAnimationFrame(drawFrame);
            }

            video.addEventListener('play', () => {
                if (mediaRecorder.state === 'inactive') {
                    mediaRecorder.start();
                    drawFrame();
                }
            }, { once: true });

            video.addEventListener('ended', () => {
                if (mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                }
            }, { once: true });

            setTimeout(() => video.play(), 300);
        }
    
    </script>
</body>

</html>

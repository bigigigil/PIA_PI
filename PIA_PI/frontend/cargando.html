<!DOCTYPE html>
<html>
<head>
    <title>Cargando...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="d-flex flex-column justify-content-center align-items-center vh-100 text-center p-4">
        
        <div class="spinner-grow text-light mb-4" style="width: 4rem; height: 4rem;" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>

        <h2 class="text-white fw-bold animate-pulse" id="loadingText">ANALIZANDO...</h2>
        <p class="text-white-50">Descargando modelo 3D y estadísticas</p>

        <div class="progress w-100 mt-4 glass-card p-0" style="height: 10px; max-width: 300px; border: none;">
            <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" 
                 id="progressBar" style="width: 0%"></div>
        </div>

    </div>

    <script>
        const textElement = document.getElementById('loadingText');
        const barElement = document.getElementById('progressBar');

        setTimeout(() => {
            barElement.style.width = "30%";
        }, 100);

        setTimeout(() => {
            textElement.innerText = "¡BANDERA DETECTADA!";
            textElement.classList.add('text-dorado'); 
            barElement.style.width = "70%";
            barElement.classList.remove('bg-warning');
            barElement.classList.add('bg-success');
        }, 1500);

        setTimeout(() => {
            barElement.style.width = "100%";
            window.location.href = 'pais.html'; 
        }, 3000);
    </script>
</body>
</html>

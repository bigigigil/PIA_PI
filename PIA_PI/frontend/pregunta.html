<!DOCTYPE html>
<html lang="es">

<head>
    <title>Trivia Mundial 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pregunta.css">
</head>

<body class="bg-light">

    <div class="app-wrapper justify-content-center">

        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-light rounded-circle shadow-sm" onclick="location.href='index.html'"
                    style="width:40px; height:40px;">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <h4 class="fw-bold text-dark m-0">TRIVIA</h4>
                <div style="width: 40px;"></div>
            </div>

            <div class="clue-box mb-4 fade-in-up">
                <span class="badge bg-primary mb-3">¿QUÉ PAÍS ES?</span>
                <h4 class="fw-bold text-center mb-0" id="questionText">Cargando pregunta...</h4>
            </div>

            <div class="prebunta-grid fade-in-up delay-1" id="answersContainer">
                <button class="btn-prebunta k-red" onclick="checkAnswer(this)">
                    <i>ᯓ⚽︎</i> <span id="opt0">...</span>
                </button>
                <button class="btn-prebunta k-blue" onclick="checkAnswer(this)">
                    <i>ᯓ⚽︎</i> <span id="opt1">...</span>
                </button>
                <button class="btn-prebunta k-yellow" onclick="checkAnswer(this)">
                    <i>ᯓ⚽︎</i> <span id="opt2">...</span>
                </button>
                <button class="btn-prebunta k-green" onclick="checkAnswer(this)">
                    <i>ᯓ⚽︎</i> <span id="opt3">...</span>
                </button>
            </div>

            <button class="btn btn-outline-secondary w-100 mt-4 rounded-pill" onclick="cargarPreguntaAleatoria()">
                <i class="bi bi-shuffle"></i> Siguiente Pregunta
            </button>
        </div>

        <button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#studyModal">
           ⋆｡° ✎ᝰ Ver Respuestas ˎˊ˗

        </button>



    </div>

    <div class="modal fade" id="resultModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 ">
                <div class="modal-body text-center p-5">
                    <h1 id="modalIcon" class="display-1 mb-3"></h1>
                    <h2 id="modalTitle" class="fw-bold"></h2>
                    <p id="modalText" class="text-muted"></p>
                    <button class="btn btn-lg btn-primary rounded-pill w-100 mt-3" data-bs-dismiss="modal"
                        onclick="cargarPreguntaAleatoria()">
                        Continuar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="studyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0">
                <div class="modal-body p-4">

                    <h4 class="fw-bold text-center mb-3">‧₊˚🖇️✩ ₊˚modo estudio ⋆｡°✎ᝰ ˎˊ˗</h4>

                    <div class="d-flex justify-content-center gap-2 mb-3">
                        <button class="btn btn-outline-primary" onclick="mostrarLista()">
                            lista ≔
                        </button>
                        <button class="btn btn-outline-success" onclick="mostrarFlashcards()">
                            flashcards 𓍢ִ໋🂡.
                        </button>


                    </div>

                    <div id="studyList" style="max-height:300px; overflow:auto;"></div>

                    <div id="flashcardsContainer" style="display:none;">

                        <div class="flashcard-container mt-3" onclick="flipCard()">
                            <div class="flashcard-inner">

                                <div class="flashcard-face flashcard-front">
                                    <h5 id="flashcardQuestion">...</h5>
                                </div>

                                <div class="flashcard-face flashcard-back">
                                    <h5 id="flashcardAnswer">...</h5>
                                </div>

                            </div>
                        </div>

                        <p id="cardCounter" class="text-center mt-2"></p>

                        <div class="d-flex justify-content-between mt-3">
                            <button class="btn btn-outline-secondary" onclick="prevCard()">←</button>
                            <button class="btn btn-outline-secondary" onclick="nextCard()">→</button>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav fade-in-up delay-3">
        <a href="index.html" class="nav-item-link"><i class="bi bi-house-door-fill"></i></a>
        <a href="buscar.html">
            <div class="camera-btn-container"><i class="bi bi-qr-code-scan"></i></div>
        </a>
        <a href="clips.html" class="nav-item-link"><i class="bi bi-play-circle-fill"></i></a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/trivia.js"></script>

</body>

</html>
